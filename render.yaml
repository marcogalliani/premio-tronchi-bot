services:
  - type: worker
    name: premio-tronchi-bot
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -e .
    startCommand: python -m premio_tronchi
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FANTACALCIO_VOTI_PAGE_URL
        value: https://www.fantacalcio.it/voti-fantacalcio-serie-a
      - key: FANTACALCIO_COOKIE
        sync: false
      - key: DATABASE_PATH
        value: /var/data/premio_tronchi.db
    disk:
      name: premio-tronchi-data
      mountPath: /var/data
      sizeGB: 1